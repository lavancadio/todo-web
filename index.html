<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Todo</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --accent: #c8f135;
      --text: #f0f0f0;
      --muted: #666;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 60px 20px;
    }

    .container {
      width: 100%;
      max-width: 560px;
    }

    header {
      margin-bottom: 48px;
    }

    header h1 {
      font-family: 'Space Mono', monospace;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -1px;
      color: var(--accent);
    }

    header p {
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 6px;
      font-family: 'Space Mono', monospace;
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 40px;
    }

    input[type="text"],
    input[type="password"] {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 14px 18px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: var(--accent);
    }

    input::placeholder { color: var(--muted); }

    button {
      cursor: pointer;
      border: none;
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      font-weight: 700;
      transition: all 0.15s;
    }

    .btn-add {
      background: var(--accent);
      color: #000;
      padding: 14px 22px;
      letter-spacing: 0.5px;
    }

    .btn-add:hover { background: #d4f55a; }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 14px 22px;
    }

    .btn-ghost:hover { color: var(--text); border-color: var(--text); }

    .todo-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 16px 18px;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .todo-item.done .todo-text {
      text-decoration: line-through;
      color: var(--muted);
    }

    .todo-check {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      background: transparent;
      flex-shrink: 0;
      position: relative;
      cursor: pointer;
      padding: 0;
    }

    .todo-item.done .todo-check {
      background: var(--accent);
      border-color: var(--accent);
    }

    .todo-item.done .todo-check::after {
      content: '✓';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #000;
      font-size: 11px;
      font-weight: 700;
    }

    .todo-text {
      flex: 1;
      font-size: 0.95rem;
      color: var(--text);
    }

    .btn-delete {
      background: transparent;
      color: var(--muted);
      padding: 4px 8px;
      font-size: 1rem;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
    }

    .todo-item:hover .btn-delete { opacity: 1; }
    .btn-delete:hover { color: #ff5555; }

    .empty {
      text-align: center;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      padding: 48px 0;
    }

    .count {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .count span { color: var(--accent); }

    .error {
      color: #ff5555;
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      margin-top: 10px;
    }

    .auth-footer {
      margin-top: 24px;
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .auth-footer a {
      color: var(--accent);
      cursor: pointer;
      text-decoration: none;
    }

    .logout-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 48px;
    }

    /* pages */
    .page { display: none; }
    .page.active { display: block; }
  </style>
</head>
<body>
  <div class="container">

    <!-- AUTH PAGE -->
    <div class="page active" id="authPage">
      <header>
        <h1>// todo</h1>
        <p id="authSubtitle">login to continue.</p>
      </header>

      <div id="authForm">
        <div class="input-row">
          <input type="text" id="authUsername" placeholder="username" />
        </div>
        <div class="input-row">
          <input type="password" id="authPassword" placeholder="password" />
          <button class="btn-add" id="authBtn" onclick="submitAuth()">LOGIN</button>
        </div>
        <div class="error" id="authError"></div>
        <div class="auth-footer">
          <span id="authToggleText">no account?</span>
          <a onclick="toggleAuthMode()"> <span id="authToggleLink">register</span></a>
        </div>
      </div>
    </div>

    <!-- TODO PAGE -->
    <div class="page" id="todoPage">
      <div class="logout-row">
        <header>
          <h1>// todo</h1>
          <p id="welcomeText">your stuff. get it done.</p>
        </header>
        <button class="btn-ghost" onclick="logout()">LOGOUT</button>
      </div>

      <div class="input-row">
        <input type="text" id="todoInput" placeholder="what needs to be done?" />
        <button class="btn-add" onclick="addTodo()">ADD</button>
      </div>

      <div class="count" id="count"></div>
      <div class="todo-list" id="todoList"></div>
    </div>

  </div>

  <script>
    const API = window.location.origin
    let isLoginMode = true

    // --- AUTH ---

    function toggleAuthMode() {
      isLoginMode = !isLoginMode
      document.getElementById('authBtn').textContent        = isLoginMode ? 'LOGIN'    : 'REGISTER'
      document.getElementById('authSubtitle').textContent   = isLoginMode ? 'login to continue.' : 'create an account.'
      document.getElementById('authToggleText').textContent = isLoginMode ? 'no account?' : 'have an account?'
      document.getElementById('authToggleLink').textContent = isLoginMode ? 'register'    : 'login'
      document.getElementById('authError').textContent = ''

      document.getElementById('authUsername').value = ''
      document.getElementById('authPassword').value = ''
    }

    async function submitAuth() {
      const username = document.getElementById('authUsername').value.trim()
      const password = document.getElementById('authPassword').value.trim()
      const errorEl  = document.getElementById('authError')

      if (!username || !password) {
        errorEl.textContent = 'fill in both fields.'
        return
      }

      const endpoint = isLoginMode ? '/login' : '/register'

      const res = await fetch(`${API}${endpoint}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      })

      const data = await res.json()

      if (!res.ok) {
        errorEl.textContent = data.error || 'something went wrong.'
        return
      }

      if (isLoginMode) {
        localStorage.setItem('token', data.token)
        localStorage.setItem('username', username)
        showTodoPage()
      } else {
        errorEl.style.color = '#c8f135'
errorEl.textContent = 'registered! now login.'
document.getElementById('authUsername').value = ''
document.getElementById('authPassword').value = ''
toggleAuthMode()
      }
    }

    function logout() {
      localStorage.removeItem('token')
      localStorage.removeItem('username')
      document.getElementById('authPage').classList.add('active')
      document.getElementById('todoPage').classList.remove('active')
      document.getElementById('authUsername').value = ''
      document.getElementById('authPassword').value = ''
    }

    function showTodoPage() {
      document.getElementById('authPage').classList.remove('active')
      document.getElementById('todoPage').classList.add('active')
      document.getElementById('welcomeText').textContent =
        `hey ${localStorage.getItem('username')}. get it done.`
      fetchTodos()
    }

    // --- HELPERS ---

    function authHeaders() {
      return {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + localStorage.getItem('token')
      }
    }

    // --- TODOS ---

    async function fetchTodos() {
      const res = await fetch(`${API}/todos`, { headers: authHeaders() })

      if (res.status === 401) { logout(); return; }

      const todos = await res.json()
      render(todos)
    }

    function render(todos) {
      const list  = document.getElementById('todoList')
      const count = document.getElementById('count')

      if (!todos || todos.length === 0) {
        list.innerHTML = '<div class="empty">nothing here. add something.</div>'
        count.innerHTML = ''
        return
      }

      const done = todos.filter(t => t.done).length
      count.innerHTML = `<span>${done}</span> / ${todos.length} done`

      list.innerHTML = todos.map(t => `
        <div class="todo-item ${t.done ? 'done' : ''}" id="todo-${t.id}">
          <button class="todo-check" onclick="markDone(${t.id})"></button>
          <span class="todo-text">${t.title}</span>
          <button class="btn-delete" onclick="deleteTodo(${t.id})">✕</button>
        </div>
      `).join('')
    }

    async function addTodo() {
      const input = document.getElementById('todoInput')
      const title = input.value.trim()
      if (!title) return

      await fetch(`${API}/todos`, {
        method: 'POST',
        headers: authHeaders(),
        body: JSON.stringify({ title })
      })

      input.value = ''
      fetchTodos()
    }

    async function markDone(id) {
      await fetch(`${API}/todos/${id}`, { method: 'PUT', headers: authHeaders() })
      fetchTodos()
    }

    async function deleteTodo(id) {
      await fetch(`${API}/todos/${id}`, { method: 'DELETE', headers: authHeaders() })
      fetchTodos()
    }

    document.getElementById('todoInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo()
    })

    document.getElementById('authPassword').addEventListener('keydown', e => {
      if (e.key === 'Enter') submitAuth()
    })

    // on load — check if already logged in
    if (localStorage.getItem('token')) {
      showTodoPage()
    }
  </script>
</body>
</html>
